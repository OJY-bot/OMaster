name: Build APK Direct

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: List APK files
        run: |
          echo "=== APK Files ==="
          find app/build/outputs/apk -name "*.apk" -type f
          echo "=================="

      - name: Rename APK for easy download
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/*-universal-*.apk output/OMaster-universal.apk 2>/dev/null || \
          cp app/build/outputs/apk/debug/*.apk output/OMaster.apk
          ls -la output/

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: latest-build
          name: Latest Build
          body: |
            自动构建的 OMaster APK
            支持一加 15 相机版本 6.105.84
            
            安装说明：
            1. 下载 APK 文件
            2. 安装到手机
            3. 在 LSPosed 中激活并勾选相机
            4. 重启手机
          files: output/*.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: OMaster-APK
          path: output/*.apk
          retention-days: 30
